<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="小怪兽">
  <meta name="theme-color" content="#FF9A56">
  <link rel="manifest" href="./manifest.json">
  <title>小怪兽养成记</title>
  <!-- CSS -->
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pet.css">
  <link rel="stylesheet" href="./css/task.css">
  <link rel="stylesheet" href="./css/shop.css">
  <link rel="stylesheet" href="./css/parent.css">
  <link rel="stylesheet" href="./css/animations.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 4 个页面容器 -->
  <main id="app">
    <div id="page-pet" class="page active"></div>
    <div id="page-tasks" class="page"></div>
    <div id="page-shop" class="page"></div>
    <div id="page-parent" class="page"></div>
  </main>

  <!-- 底部导航栏 -->
  <nav id="bottom-nav">
    <a href="#pet" class="nav-item active" data-page="pet">
      <span class="nav-icon">🐾</span>
      <span class="nav-label">宠物乐园</span>
    </a>
    <a href="#tasks" class="nav-item" data-page="tasks">
      <span class="nav-icon">📋</span>
      <span class="nav-label">任务中心</span>
    </a>
    <a href="#shop" class="nav-item" data-page="shop">
      <span class="nav-icon">🏪</span>
      <span class="nav-label">星币商店</span>
    </a>
    <a href="#parent" class="nav-item" data-page="parent">
      <span class="nav-icon">👨‍👩‍👧</span>
      <span class="nav-label">家长面板</span>
    </a>
    <div id="nav-coins" class="nav-coins">💰 <span id="coin-count">50</span></div>
  </nav>

  <!-- 首次引导弹窗 -->
  <div id="onboarding-overlay" class="overlay hidden">
    <div id="onboarding-modal" class="modal onboarding-modal">
      <div id="onboarding-step-1" class="onboarding-step active">
        <div class="onboarding-emoji">🐱</div>
        <h2>欢迎来到小怪兽养成记！</h2>
        <p>给你的小宠物取个名字吧~</p>
        <input type="text" id="pet-name-input" class="input-field" placeholder="输入宠物名字..." maxlength="10">
        <button id="onboarding-next-1" class="btn btn-primary">下一步 →</button>
      </div>
      <div id="onboarding-step-2" class="onboarding-step">
        <div class="onboarding-emoji">🌟</div>
        <h2>这是你的小宠物！</h2>
        <p>完成任务就能让它长大哦！<br>快去任务中心看看吧~</p>
        <button id="onboarding-next-2" class="btn btn-primary">开始冒险 🎉</button>
      </div>
    </div>
  </div>

  <!-- Toast 通知容器 -->
  <div id="toast-container"></div>

  <!-- 确认弹窗容器 -->
  <div id="confirm-overlay" class="overlay hidden">
    <div id="confirm-dialog" class="modal confirm-modal">
      <p id="confirm-message"></p>
      <div class="confirm-buttons">
        <button id="confirm-cancel" class="btn btn-secondary">取消</button>
        <button id="confirm-ok" class="btn btn-danger">确定</button>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="./js/app.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/onboarding.js"></script>
  <script src="./js/pet-renderer.js"></script>
  <script src="./js/pet-interaction.js"></script>
  <script src="./js/task-list.js"></script>
  <script src="./js/task-parser.js"></script>
  <script src="./js/task-ai.js"></script>
  <script src="./js/task-creator.js"></script>
  <script src="./js/task-templates.js"></script>
  <script src="./js/weekly-plan.js"></script>
  <script src="./js/reminder.js"></script>
  <script src="./js/shop.js"></script>
  <script src="./js/stats-io.js"></script>
  <script src="./js/parent-panel.js"></script>
</body>
</html>
